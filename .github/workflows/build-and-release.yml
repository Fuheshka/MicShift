name: Build and Release MicShift

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore MicShift.csproj

    - name: Restore test dependencies
      run: dotnet restore MicShift.Tests/MicShift.Tests.csproj

    - name: Run Tests
      run: dotnet test MicShift.Tests/MicShift.Tests.csproj --no-restore --verbosity normal

    - name: Publish Single-File Self-Contained Executable
      run: |
        dotnet publish MicShift.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:PublishTrimmed=false -o ./publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MicShift-win-x64
        path: ./publish/MicShift.exe

    - name: Create Release and Upload Assets
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: ./publish/MicShift.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
